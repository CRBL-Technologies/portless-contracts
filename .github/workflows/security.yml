name: Security

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo-deny
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-deny-0.19.6-rust-1.95

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null 2>&1 || ! cargo-deny --version | grep -q 'cargo-deny 0.19.6'; then
            cargo install cargo-deny --version 0.19.6 --locked
          fi

      - name: Check Rust dependency policy
        run: cargo deny check advisories bans licenses sources

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.25.x"
          cache: false

      - name: Add Go bin to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cache gitleaks
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/bin/gitleaks
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-gitleaks-v8.29.1-go-1.25

      - name: Install gitleaks
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          if ! command -v gitleaks >/dev/null 2>&1 || ! gitleaks version | grep -q '8.29.1'; then
            go install github.com/zricethezav/gitleaks/v8@v8.29.1
          fi

      - name: Scan git history for secrets
        run: gitleaks git . --redact --no-banner --log-opts="--all"
