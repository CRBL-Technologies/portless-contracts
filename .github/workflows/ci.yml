name: Contracts CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check protobuf contracts
        uses: bufbuild/buf-action@v1
        with:
          version: 1.69.0
          lint: true
          format: true
          breaking: ${{ github.event_name == 'pull_request' || (github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000') }}
          push: false
          pr_comment: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-rust-1.95-contracts-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-1.95-contracts-

      - name: Check generated packages
        run: |
          GOWORK=off go test ./...
          cargo test --locked
