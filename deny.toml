[graph]
all-features = true

[advisories]
ignore = []

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Elastic-2.0",
  "MIT",
  "Unicode-3.0",
]
confidence-threshold = 0.8

[bans]
# Duplicate versions are currently expected in the tonic/prost toolchain.
# Advisories still fail vulnerable duplicate crates.
multiple-versions = "allow"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
